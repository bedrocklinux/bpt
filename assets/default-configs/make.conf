#!/hint/sh
#
# Environment variables for building bpt packages.
#
# Before sourcing this file, bpt populates the following bpt-specific
# variables:
#
# - pkgname: The name of the package to be built.
# - pkgver: The version of the package to be built.
# - arch: The target architecture
# - native_host_arch: "native" if building non-portable package for
#   host machine, "host" if building portable package for host machine,
#   or otherwise identical to `${arch}`.
# - pkgdir: The location built files should be placed.
# - workdir: Temporary working location with things like source code and
# dependencies
# - rootdir: The operating root directory.  This is a combination of the bpt
# `-R`/`--root-dir` flag and, if running on Bedrock Linux, the stratum host
# path prefix.


# Compiler flags
#
# The build-time and run-time library locations may differ due to different
# stratum root directories.
#
# bpt leverages both installed build dependencies in the rootdir and
# temporarily needed build dependencies in the workdir.  Both must be included
# in the search path.
export CFLAGS="-O2"
export CXXFLAGS="${CFLAGS}"
export CPPFLAGS="-I${rootdir}/usr/${arch}/include -I${workdir}/usr/${arch}/include"
export LDFLAGS="-Wl,-s"
export LDFLAGS="${LDFLAGS} -Wl,-L${workdir}/usr/${arch}/lib"
export LDFLAGS="${LDFLAGS} -Wl,-L${rootdir}/usr/${arch}/lib"
export LDFLAGS="${LDFLAGS} -Wl,-rpath,/usr/${arch}/lib"
export RUSTFLAGS=""
export PATH="${workdir}/usr/bin:${PATH}"

# Build tool flags
export MAKEFLAGS="-j$(grep -c '^processor' /proc/cpuinfo)"
export PKG_CONFIG_PATH="${workdir}/usr/${arch}/lib/pkgconfig:${rootdir}/usr/${arch}/lib/pkgconfig"
export CMAKE_PREFIX_PATH="${workdir}/usr/${arch}/lib:${rootdir}/usr/${arch}/lib"

# Compilation optimizations
if [ "${native_host_arch}" = "native" ]; then
	export CFLAGS="${CFLAGS} -march=native"
	export CXXFLAGS="${CXXFLAGS} -march=native"
	export RUSTFLAGS="${RUSTFLAGS} -C target-cpu=native"
fi

# Target platform specific configuration
case "${arch}" in
"noarch") # architecture agnostic
	unset CHOST
	unset CARGO_BUILD_TARGET
	;;
"aarch64")
	export CHOST="aarch64-linux-musl"
	export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"
	;;
"armv7l")
	export CHOST="arm-linux-musleabi"
	export CARGO_BUILD_TARGET="arm-unknown-linux-musleabi"
	;;
"armv7hl")
	export CHOST="arm-linux-musleabihf"
	export CARGO_BUILD_TARGET="arm-unknown-linux-musleabihf"
	;;
"i586")
	export CHOST="i586-linux-musl"
	export CARGO_BUILD_TARGET="i586-unknown-linux-musl"
	;;
"i686")
	export CHOST="i686-linux-musl"
	export CARGO_BUILD_TARGET="i686-unknown-linux-musl"
	;;
"loongarch64")
	export CHOST="loongarch64-linux-musl"
	export CARGO_BUILD_TARGET="loongarch64-unknown-linux-musl"
	;;
"mips")
	export CHOST="mips-linux-musl"
	export CARGO_BUILD_TARGET="mips-unknown-linux-musl"
	;;
"mips64")
	export CHOST="mips64-linux-muslabi64"
	export CARGO_BUILD_TARGET="mips64-unknown-linux-muslabi64"
	;;
"mips64el")
	export CHOST="mips64el-linux-muslabi64"
	export CARGO_BUILD_TARGET="mips64el-unknown-linux-muslabi64"
	;;
"mipsel")
	export CHOST="mipsel-linux-musl"
	export CARGO_BUILD_TARGET="mipsel-unknown-linux-musl"
	;;
"powerpc")
	export CHOST="powerpc-linux-musl"
	export CARGO_BUILD_TARGET="powerpc-unknown-linux-musl"
	;;
"powerpc64")
	export CHOST="powerpc64-linux-musl"
	export CARGO_BUILD_TARGET="powerpc64-unknown-linux-musl"
	;;
"powerpc64le")
	export CHOST="powerpc64le-linux-musl"
	export CARGO_BUILD_TARGET="powerpc64le-unknown-linux-musl"
	;;
"riscv64gc")
	export CHOST="riscv64-linux-musl"
	export CARGO_BUILD_TARGET="riscv64gc-unknown-linux-musl"
	;;
"s390x")
	export CHOST="s390x-linux-musl"
	export CARGO_BUILD_TARGET="s390x-unknown-linux-musl"
	;;
"x86_64")
	export CHOST="x86_64-linux-musl"
	export CARGO_BUILD_TARGET="x86_64-unknown-linux-musl"
	;;
*)
	echo "bpt make.conf contains an unknown architecture: ${arch}" >&2
	exit 1
esac

# Cross-compile prefix
case "${native_host_arch}" in
"native" | "host" | "noarch") export CROSS_COMPILE="" ;;
*) export CROSS_COMPILE="${CHOST:-}-" ;;
esac

# Common compilation variables
export CC="${CROSS_COMPILE}gcc"
export LD="${CROSS_COMPILE}ld"
export AR="${CROSS_COMPILE}ar"

# If building on Bedrock and using a compiler from a potentially different
# stratum, ensure we can find the compiler's runtime libraries.
if compiler_stratum=$(brl which "${CC}"); then
	if libgcc="$("${CC}" -print-libgcc-file-name)"; then
		libgcc="/bedrock/strata/${compiler_stratum}${libgcc}"
		export LDFLAGS="${LDFLAGS} -Wl,-L$(dirname "${libgcc}") -Wl,${libgcc}"
		export RUSTFLAGS="${RUSTFLAGS} -C link-arg=-L$(dirname "${libgcc}") -C link-arg=${libgcc}"
	fi

	if libssp_nonshared="$("${CC}" -print-file-name=libssp_nonshared.a)" && [ "${libssp_nonshared}" != "libssp_nonshared.a" ]; then
		libssp_nonshared="/bedrock/strata/${compiler_stratum}${libssp_nonshared}"
		export LDFLAGS="${LDFLAGS} -Wl,-L$(dirname "${libssp_nonshared}")"
		export RUSTFLAGS="${RUSTFLAGS} -C link-arg=-L$(dirname "${libssp_nonshared}")"
	fi
fi
